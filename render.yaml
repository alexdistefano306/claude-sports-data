<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Prop Edge — Player Data Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh}
header{background:#111318;border-bottom:1px solid #1e2330;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:16px;font-weight:700;color:#60a5fa}
.logo span{color:#94a3b8;font-weight:400;font-size:13px;margin-left:8px}
.main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:260px;background:#111318;border-right:1px solid #1e2330;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.search-wrap{padding:12px;border-bottom:1px solid #1e2330}
.search-wrap input{width:100%;background:#0d0f14;border:1px solid #1e2330;border-radius:6px;padding:9px 12px;color:#e2e8f0;font-size:13px;outline:none}
.search-wrap input:focus{border-color:#60a5fa}
.alpha-nav{display:flex;flex-wrap:wrap;gap:3px;padding:10px 12px;border-bottom:1px solid #1e2330}
.alpha-btn{padding:3px 6px;border-radius:4px;border:none;background:#1e2330;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s}
.alpha-btn:hover,.alpha-btn.active{background:#2563eb;color:#fff}
.player-list{flex:1;overflow-y:auto;padding:6px 0}
.player-list::-webkit-scrollbar{width:4px}
.player-list::-webkit-scrollbar-track{background:#0d0f14}
.player-list::-webkit-scrollbar-thumb{background:#1e2330;border-radius:2px}
.player-item{padding:8px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;transition:background 0.1s;border-left:2px solid transparent}
.player-item:hover{background:#1a1f2e}
.player-item.active{background:#1e3a5f;border-left-color:#60a5fa}
.player-team{font-size:10px;padding:2px 5px;border-radius:3px;background:#1e2330;color:#60a5fa}
.list-loading,.list-empty{padding:20px 16px;color:#64748b;font-size:13px;text-align:center}

/* ── Content ── */
.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:#0d0f14}
.content::-webkit-scrollbar-thumb{background:#1e2330;border-radius:3px}

/* ── Welcome / empty state ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#64748b;text-align:center;gap:12px}
.welcome h2{color:#e2e8f0;font-size:20px}
.welcome p{font-size:14px;max-width:380px;line-height:1.6}

/* ── Player header ── */
.player-header{background:#111318;border:1px solid #1e2330;border-radius:10px;padding:18px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.player-name-big{font-size:22px;font-weight:700}
.player-tags{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:3px;background:#1e2330;color:#94a3b8}
.tag.pos{background:#1e3a5f;color:#60a5fa}
.tag.team{background:#14532d;color:#4ade80}
.tag.status-active{background:#14532d;color:#4ade80}
.tag.status-out{background:#450a0a;color:#f87171}
.tag.status-gtd{background:#431407;color:#fb923c}

/* ── Section titles ── */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.tier-badge{font-size:9px;padding:2px 5px;border-radius:3px;background:#1e3a5f;color:#60a5fa}
.tier-badge.t2{background:#3b2a1a;color:#fb923c}
.tier-badge.t3{background:#2a1a3b;color:#c084fc}

/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.stat-card{background:#111318;border:1px solid #1e2330;border-radius:10px;padding:16px}
.stat-card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#64748b;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ── Stat rows ── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0d0f14;font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#94a3b8}
.stat-val{font-weight:600;font-variant-numeric:tabular-nums}
.green{color:#4ade80}
.red{color:#f87171}
.orange{color:#fb923c}
.blue{color:#60a5fa}
.gray{color:#64748b}
.white{color:#e2e8f0}

/* ── Split compare ── */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.split-col{background:#0d0f14;border-radius:6px;padding:10px;text-align:center}
.split-label-sm{font-size:10px;color:#64748b;margin-bottom:6px}
.split-big{font-size:20px;font-weight:700}
.split-sub{font-size:11px;color:#64748b;margin-top:3px}

/* ── Game log table ── */
.game-table{width:100%;border-collapse:collapse;font-size:12px}
.game-table th{text-align:left;padding:6px 8px;color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #1e2330}
.game-table td{padding:6px 8px;border-bottom:1px solid #0d0f14}
.game-table tr:last-child td{border-bottom:none}
.game-table tr:hover td{background:#1a1f2e}
.wl-w{color:#4ade80;font-weight:700}
.wl-l{color:#f87171;font-weight:700}

/* ── Projection calculator ── */
.calc-card{background:#0f172a;border:1px solid #2563eb;border-radius:10px;padding:18px}
.calc-title{color:#60a5fa;font-size:13px;font-weight:700;margin-bottom:14px}
.calc-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.calc-input label{display:block;font-size:10px;color:#64748b;margin-bottom:4px}
.calc-input input{width:100%;background:#111318;border:1px solid #1e2330;border-radius:5px;padding:7px 9px;color:#e2e8f0;font-size:13px;outline:none}
.calc-input input:focus{border-color:#60a5fa}
.mult-wrap{margin-bottom:14px}
.mult-label{font-size:10px;color:#64748b;margin-bottom:6px}
.mult-tags{display:flex;flex-wrap:wrap;gap:5px}
.mtag{padding:4px 9px;border-radius:4px;border:1px solid #1e2330;font-size:11px;cursor:pointer;background:#111318;color:#94a3b8;transition:all 0.15s;user-select:none}
.mtag:hover{border-color:#475569}
.mtag.on{background:#1e3a5f;border-color:#2563eb;color:#60a5fa}
.mtag.neg.on{background:#450a0a;border-color:#dc2626;color:#f87171}
.calc-btn{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px}
.calc-btn:hover{background:#1d4ed8}
.calc-result{background:#111318;border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.calc-proj-num{font-size:36px;font-weight:800;color:#60a5fa}
.calc-proj-label{font-size:10px;color:#64748b;margin-bottom:4px}
.line-wrap{display:flex;align-items:center;gap:8px}
.line-wrap label{font-size:11px;color:#64748b}
.line-wrap input{width:75px;background:#0d0f14;border:1px solid #1e2330;border-radius:5px;padding:6px 8px;color:#e2e8f0;font-size:14px;text-align:center;outline:none}
.gap-display{font-size:13px;font-weight:700;margin-top:6px}

/* ── Loading / error ── */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:#64748b;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #1e2330;border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:#450a0a;border:1px solid #dc2626;border-radius:8px;padding:14px 16px;color:#fca5a5;font-size:13px;line-height:1.6;margin:16px 0}

/* ── Bar ── */
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;background:#1e2330;border-radius:3px;height:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2563eb,#60a5fa)}

@media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;max-height:300px}.stats-grid{grid-template-columns:1fr}.calc-inputs{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">

<header>
  <div>
    <span class="logo">⚡ Prop Edge Dashboard <span>v3.1 — NBA Player Data</span></span>
  </div>
  <div style="font-size:11px;color:#64748b">All data fetched directly from NBA Stats API • Model v3.1</div>
</header>

<div class="main">

  <!-- ── SIDEBAR ───────────────────────────────────────────────── -->
  <div class="sidebar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search player..." oninput="filterPlayers()"/>
    </div>
    <div class="alpha-nav" id="alphNav"></div>
    <div class="player-list" id="playerList">
      <div class="list-loading">Loading all NBA players...</div>
    </div>
  </div>

  <!-- ── CONTENT ───────────────────────────────────────────────── -->
  <div class="content" id="content">
    <div class="welcome">
      <div style="font-size:40px">⚡</div>
      <h2>Prop Edge Player Dashboard</h2>
      <p>Select any NBA player from the sidebar to load their full stat card — season averages, career averages, home/away splits, B2B splits, last 10 games, minutes trend, and the projection calculator.</p>
      <p style="margin-top:8px;font-size:12px;color:#475569">Data loads directly from NBA Stats API in your browser. No truncation. Every player is accessible.</p>
    </div>
  </div>

</div>
</div>

<script>
// ────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ────────────────────────────────────────────────────────────────────────────
const SEASON = '2025-26';
const NBA_BASE = 'https://stats.nba.com/stats';
const NBA_HEADERS = {
  'Accept': 'application/json, text/plain, */*',
  'Accept-Language': 'en-US,en;q=0.9',
  'x-nba-stats-origin': 'stats',
  'x-nba-stats-token': 'true',
  'Origin': 'https://www.nba.com',
  'Referer': 'https://www.nba.com/',
};

// Simple in-memory cache
const CACHE = new Map();
async function nbaFetch(endpoint, params = {}) {
  const url = new URL(`${NBA_BASE}/${endpoint}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const key = url.toString();
  if (CACHE.has(key)) return CACHE.get(key);
  const res = await fetch(key, { headers: NBA_HEADERS });
  if (!res.ok) throw new Error(`NBA API ${res.status}: ${endpoint}`);
  const data = await res.json();
  CACHE.set(key, data);
  return data;
}

function parseRows(data, setIdx = 0) {
  const rs = data.resultSets[setIdx];
  if (!rs || !rs.rowSet.length) return [];
  return rs.rowSet.map(row => {
    const obj = {};
    rs.headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
}

// ────────────────────────────────────────────────────────────────────────────
// PLAYER LIST — load once, show alphabetically
// ────────────────────────────────────────────────────────────────────────────
let ALL_PLAYERS = [];
let CURRENT_LETTER = 'A';
let ACTIVE_PLAYER_ID = null;

async function loadAllPlayers() {
  try {
    const data = await nbaFetch('commonallplayers', {
      LeagueID: '00', Season: SEASON, IsOnlyCurrentSeason: 1
    });
    ALL_PLAYERS = parseRows(data).map(p => ({
      id: p.PERSON_ID,
      name: p.DISPLAY_FIRST_LAST,
      team: p.TEAM_ABBREVIATION || '—',
      lastName: (p.DISPLAY_LAST_COMMA_FIRST || p.DISPLAY_FIRST_LAST).split(',')[0].trim(),
    })).sort((a, b) => a.name.localeCompare(b.name));
    buildAlphaNav();
    showLetter('A');
  } catch (e) {
    document.getElementById('playerList').innerHTML =
      `<div class="list-empty" style="color:#f87171">Failed to load players.<br>${e.message}<br><br>This usually means the NBA API blocked the request. Try refreshing.</div>`;
  }
}

function buildAlphaNav() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const nav = document.getElementById('alphNav');
  nav.innerHTML = '';
  // Add "ALL" button
  const all = document.createElement('button');
  all.className = 'alpha-btn';
  all.textContent = 'ALL';
  all.onclick = () => showLetter('ALL');
  nav.appendChild(all);
  letters.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn';
    btn.textContent = l;
    btn.id = `alpha-${l}`;
    btn.onclick = () => showLetter(l);
    nav.appendChild(btn);
  });
}

function showLetter(letter) {
  CURRENT_LETTER = letter;
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = letter === 'ALL'
    ? document.querySelector('.alpha-btn')
    : document.getElementById(`alpha-${letter}`);
  if (activeBtn) activeBtn.classList.add('active');
  filterPlayers();
}

function filterPlayers() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = ALL_PLAYERS;
  if (query) {
    filtered = ALL_PLAYERS.filter(p => p.name.toLowerCase().includes(query));
  } else if (CURRENT_LETTER !== 'ALL') {
    filtered = ALL_PLAYERS.filter(p => p.name.toUpperCase().startsWith(CURRENT_LETTER));
  }

  const list = document.getElementById('playerList');
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty">No players found</div>`;
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="player-item ${p.id === ACTIVE_PLAYER_ID ? 'active' : ''}"
         id="pi-${p.id}"
         onclick="selectPlayer(${p.id}, '${p.name.replace(/'/g, "\\'")}', '${p.team}')">
      <span>${p.name}</span>
      <span class="player-team">${p.team}</span>
    </div>
  `).join('');
}

function selectPlayer(id, name, team) {
  ACTIVE_PLAYER_ID = id;
  // Update active state in list
  document.querySelectorAll('.player-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`pi-${id}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
  loadPlayerCard(id, name, team);
}

// ────────────────────────────────────────────────────────────────────────────
// PLAYER CARD
// ────────────────────────────────────────────────────────────────────────────
async function loadPlayerCard(playerId, playerName, playerTeam) {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Loading ${playerName}...</div>`;

  try {
    // Fetch all data in parallel
    const [infoData, gameLogData, splitData, careerData] = await Promise.all([
      nbaFetch('commonplayerinfo', { PlayerID: playerId }),
      nbaFetch('playergamelog', { PlayerID: playerId, Season: SEASON, SeasonType: 'Regular Season' }),
      nbaFetch('playerdashboardbygeneralsplits', {
        PlayerID: playerId, Season: SEASON, SeasonType: 'Regular Season',
        MeasureType: 'Base', PerMode: 'PerGame', PlusMinus: 'N',
        PaceAdjust: 'N', Rank: 'N', Outcome: '', Location: '', Month: 0,
        SeasonSegment: '', DateFrom: '', DateTo: '', OpponentTeamID: 0,
        VsConference: '', VsDivision: '', GameSegment: '', Period: 0,
        ShotClockRange: '', LastNGames: 0, GameScope: '',
        PlayerExperience: '', PlayerPosition: '', StarterBench: '',
      }),
      nbaFetch('playercareerstats', { PlayerID: playerId, PerMode: 'PerGame' }),
    ]);

    const info = parseRows(infoData)[0] || {};
    const logs = parseRows(gameLogData);
    const overallSplits = parseRows(splitData, 0);
    const locationSplits = parseRows(splitData, 1);
    const restSplits = parseRows(splitData, 4);
    const careerTotals = parseRows(careerData, 1)[0] || {};
    const careerByYear = parseRows(careerData, 0);

    const season = overallSplits.find(r => r.GROUP_VALUE === 'Overall') || overallSplits[0] || {};
    const home = locationSplits.find(r => r.GROUP_VALUE === 'Home') || {};
    const away = locationSplits.find(r => r.GROUP_VALUE === 'Road') || {};
    const b2b = restSplits.find(r => r.GROUP_VALUE === '0 Days Rest') || {};
    const oneDay = restSplits.find(r => r.GROUP_VALUE === '1 Day Rest') || {};
    const twoPlusDay = restSplits.find(r => r.GROUP_VALUE === '2+ Days Rest') || {};

    // Recent game calculations
    const last5 = logs.slice(0, 5);
    const last10 = logs.slice(0, 10);
    const last20 = logs.slice(0, 20);

    const avg = (games, stat) => {
      const vals = games.map(g => parseFloat(g[stat]) || 0).filter((_, i) => games[i][stat] != null);
      return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : '—';
    };

    // Build projection inputs
    const careerPts = parseFloat(careerTotals.PTS) || 0;
    const seasonPts = parseFloat(season.PTS) || 0;
    const lastGamePts = logs[0] ? parseFloat(logs[0].PTS) || 0 : seasonPts;
    const baseProjPts = ((careerPts * 0.855) + (seasonPts * 0.142) + (lastGamePts * 0.003)).toFixed(1);

    const careerReb = parseFloat(careerTotals.REB) || 0;
    const seasonReb = parseFloat(season.REB) || 0;
    const careerAst = parseFloat(careerTotals.AST) || 0;
    const seasonAst = parseFloat(season.AST) || 0;

    // Status
    const status = info.ROSTERSTATUS || 'Active';
    const statusClass = status === 'Active' ? 'status-active' : 'status-out';

    // Double-double rate
    const ddCount = logs.filter(g => {
      const pts = parseFloat(g.PTS) || 0;
      const reb = parseFloat(g.REB) || 0;
      const ast = parseFloat(g.AST) || 0;
      const cats = [pts >= 10, reb >= 10, ast >= 10].filter(Boolean).length;
      return cats >= 2;
    }).length;
    const ddRate = logs.length ? ((ddCount / logs.length) * 100).toFixed(0) : '—';

    // B2B diff
    const b2bPts = parseFloat(b2b.PTS) || null;
    const b2bDiff = b2bPts && seasonPts ? (b2bPts - seasonPts).toFixed(1) : null;

    // Minutes trend
    const minTrend = last5.map(g => ({ date: g.GAME_DATE, min: g.MIN, opp: g.MATCHUP }));
    const maxMin = Math.max(...minTrend.map(g => parseFloat(g.min) || 0), 40);

    // Usage
    const usg = season.USG_PCT ? (parseFloat(season.USG_PCT) * 100).toFixed(1) : '—';
    const ts = season.TS_PCT ? (parseFloat(season.TS_PCT) * 100).toFixed(1) : '—';
    const fg = season.FG_PCT ? (parseFloat(season.FG_PCT) * 100).toFixed(1) : '—';
    const fg3 = season.FG3_PCT ? (parseFloat(season.FG3_PCT) * 100).toFixed(1) : '—';

    // Game log rows
    const logRows = last10.map(g => {
      const pts = g.PTS ?? '—';
      const reb = g.REB ?? '—';
      const ast = g.AST ?? '—';
      const min = g.MIN ?? '—';
      const pra = (parseFloat(g.PTS||0) + parseFloat(g.REB||0) + parseFloat(g.AST||0)).toFixed(0);
      return `<tr>
        <td style="color:#94a3b8">${g.GAME_DATE}</td>
        <td style="color:#e2e8f0">${g.MATCHUP}</td>
        <td><b>${pts}</b></td>
        <td>${reb}</td>
        <td>${ast}</td>
        <td>${pra}</td>
        <td style="color:#94a3b8">${min}</td>
        <td class="${g.WL === 'W' ? 'wl-w' : 'wl-l'}">${g.WL || '—'}</td>
      </tr>`;
    }).join('');

    // Career season rows (last 5 years)
    const careerRows = careerByYear.slice(-5).map(y => `<tr>
      <td style="color:#94a3b8">${y.SEASON_ID}</td>
      <td style="color:#64748b">${y.TEAM_ABBREVIATION}</td>
      <td>${y.GP}</td>
      <td><b>${y.PTS}</b></td>
      <td>${y.REB}</td>
      <td>${y.AST}</td>
      <td style="color:#94a3b8">${y.MIN}</td>
      <td style="color:#94a3b8">${y.USG_PCT ? (y.USG_PCT*100).toFixed(0)+'%' : '—'}</td>
    </tr>`).join('');

    // Min trend bars
    const minBars = minTrend.map(g => {
      const pct = ((parseFloat(g.min) || 0) / maxMin * 100).toFixed(0);
      return `<div class="stat-row">
        <span class="stat-label" style="font-size:11px">${g.date} · ${g.opp?.split(' ').pop() || ''}</span>
        <div class="bar-wrap" style="width:55%">
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="stat-val white" style="min-width:30px;font-size:12px">${g.min}</span>
        </div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <!-- PLAYER HEADER -->
      <div class="player-header">
        <div>
          <div class="player-name-big">${info.DISPLAY_FIRST_LAST || playerName}</div>
          <div class="player-tags">
            <span class="tag team">${info.TEAM_ABBREVIATION || playerTeam}</span>
            <span class="tag pos">${info.POSITION || '—'}</span>
            <span class="tag">#${info.JERSEY || '—'}</span>
            <span class="tag ${statusClass}">${status}</span>
          </div>
        </div>
        <div style="text-align:right;font-size:11px;color:#64748b">
          <div>${info.SCHOOL || ''}</div>
          <div>Exp: ${info.SEASON_EXP || '—'} yrs</div>
          <div>${info.HEIGHT || ''} · ${info.WEIGHT || ''} lbs</div>
        </div>
      </div>

      <!-- TIER 1 -->
      <div class="section-title">Tier 1 — Primary Data <span class="tier-badge">ALWAYS USE</span></div>
      <div class="stats-grid">

        <!-- Season Averages -->
        <div class="stat-card">
          <div class="stat-card-title">📊 Season Averages (14.2% weight) <span class="tier-badge">TIER 1</span></div>
          <div class="stat-row"><span class="stat-label">Points</span><span class="stat-val white">${season.PTS ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Rebounds</span><span class="stat-val white">${season.REB ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Assists</span><span class="stat-val white">${season.AST ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">PRA Combined</span><span class="stat-val blue">${((parseFloat(season.PTS||0))+(parseFloat(season.REB||0))+(parseFloat(season.AST||0))).toFixed(1)}</span></div>
          <div class="stat-row"><span class="stat-label">Minutes</span><span class="stat-val white">${season.MIN ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Usage %</span><span class="stat-val ${parseFloat(usg) > 25 ? 'green' : 'white'}">${usg}%</span></div>
          <div class="stat-row"><span class="stat-label">True Shooting %</span><span class="stat-val ${parseFloat(ts) >= 58 ? 'green' : parseFloat(ts) < 52 ? 'red' : 'orange'}">${ts}%</span></div>
          <div class="stat-row"><span class="stat-label">FG %</span><span class="stat-val white">${fg}%</span></div>
          <div class="stat-row"><span class="stat-label">3PT %</span><span class="stat-val white">${fg3}%</span></div>
          <div class="stat-row"><span class="stat-label">Blocks</span><span class="stat-val white">${season.BLK ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Steals</span><span class="stat-val white">${season.STL ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Turnovers</span><span class="stat-val orange">${season.TOV ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Games Played</span><span class="stat-val gray">${season.GP ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">DD Rate (season)</span><span class="stat-val ${parseInt(ddRate) >= 50 ? 'green' : 'white'}">${ddRate}% (${ddCount}/${logs.length} G)</span></div>
        </div>

        <!-- Career Averages -->
        <div class="stat-card">
          <div class="stat-card-title">🏆 Career Averages (85.5% weight) <span class="tier-badge">TIER 1</span></div>
          <div class="stat-row"><span class="stat-label">Points</span><span class="stat-val white">${careerTotals.PTS ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Rebounds</span><span class="stat-val white">${careerTotals.REB ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Assists</span><span class="stat-val white">${careerTotals.AST ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">PRA Combined</span><span class="stat-val blue">${((parseFloat(careerTotals.PTS||0))+(parseFloat(careerTotals.REB||0))+(parseFloat(careerTotals.AST||0))).toFixed(1)}</span></div>
          <div class="stat-row"><span class="stat-label">Minutes</span><span class="stat-val white">${careerTotals.MIN ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">FG %</span><span class="stat-val white">${careerTotals.FG_PCT ? (careerTotals.FG_PCT*100).toFixed(1) + '%' : '—'}</span></div>
          <div class="stat-row"><span class="stat-label">3PT %</span><span class="stat-val white">${careerTotals.FG3_PCT ? (careerTotals.FG3_PCT*100).toFixed(1) + '%' : '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Career Games</span><span class="stat-val gray">${careerTotals.GP ?? '—'}</span></div>
          <div class="stat-row"><span class="stat-label">Model Base Projection (PTS)</span>
            <span class="stat-val blue">${baseProjPts}</span></div>
          <div style="font-size:10px;color:#475569;margin-top:8px;padding-top:8px;border-top:1px solid #0d0f14">
            Formula: (${careerPts} × 0.855) + (${seasonPts} × 0.142) + (${lastGamePts} × 0.003)
          </div>
        </div>

        <!-- Home / Away Splits -->
        <div class="stat-card">
          <div class="stat-card-title">🏠 Home / Away Splits <span class="tier-badge">TIER 1</span></div>
          <div class="split-grid" style="margin-bottom:12px">
            <div class="split-col">
              <div class="split-label-sm">🏠 HOME (${home.GP || '—'} G)</div>
              <div class="split-big green">${home.PTS ?? '—'}</div>
              <div class="split-sub">${home.REB ?? '—'} reb · ${home.AST ?? '—'} ast</div>
              <div class="split-sub">${home.MIN ?? '—'} min</div>
            </div>
            <div class="split-col">
              <div class="split-label-sm">✈️ AWAY (${away.GP || '—'} G)</div>
              <div class="split-big blue">${away.PTS ?? '—'}</div>
              <div class="split-sub">${away.REB ?? '—'} reb · ${away.AST ?? '—'} ast</div>
              <div class="split-sub">${away.MIN ?? '—'} min</div>
            </div>
          </div>
          ${home.PTS && away.PTS ? `<div class="stat-row">
            <span class="stat-label">Home vs Away diff (pts)</span>
            <span class="stat-val ${parseFloat(home.PTS) > parseFloat(away.PTS) ? 'green' : 'red'}">
              ${parseFloat(home.PTS) > parseFloat(away.PTS) ? '+' : ''}${(parseFloat(home.PTS) - parseFloat(away.PTS)).toFixed(1)}
            </span>
          </div>` : ''}
        </div>

        <!-- Minutes Trend -->
        <div class="stat-card">
          <div class="stat-card-title">⏱ Minutes Trend (Last 5 G) <span class="tier-badge">TIER 1</span></div>
          ${minBars || '<div class="stat-row"><span class="stat-label gray">No data</span></div>'}
          <div class="stat-row" style="margin-top:8px">
            <span class="stat-label">L5 avg min</span>
            <span class="stat-val white">${avg(last5, 'MIN')}</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Season avg min</span>
            <span class="stat-val white">${season.MIN ?? '—'}</span>
          </div>
          ${last5.length && season.MIN ? `<div class="stat-row">
            <span class="stat-label">Trend vs season</span>
            <span class="stat-val ${parseFloat(avg(last5,'MIN')) > parseFloat(season.MIN) ? 'green' : 'red'}">
              ${parseFloat(avg(last5,'MIN')) > parseFloat(season.MIN) ? '↑ Trending up' : '↓ Trending down'}
            </span>
          </div>` : ''}
        </div>

      </div><!-- /tier1 grid -->

      <!-- TIER 2 -->
      <div class="section-title">Tier 2 — Situational Data <span class="tier-badge t2">HIGH IMPACT</span></div>
      <div class="stats-grid">

        <!-- B2B Splits -->
        <div class="stat-card">
          <div class="stat-card-title">😤 Back-to-Back Splits <span class="tier-badge t2">TIER 2</span></div>
          <div class="split-grid" style="margin-bottom:10px">
            <div class="split-col">
              <div class="split-label-sm">B2B · 0 Days Rest (${b2b.GP || '—'} G)</div>
              <div class="split-big ${b2bDiff && parseFloat(b2bDiff) < 0 ? 'red' : 'green'}">${b2b.PTS ?? '—'}</div>
              <div class="split-sub">${b2b.REB ?? '—'} reb · ${b2b.AST ?? '—'} ast · ${b2b.MIN ?? '—'} min</div>
              ${b2bDiff ? `<div class="split-sub" style="color:${parseFloat(b2bDiff)<0?'#f87171':'#4ade80'}">${parseFloat(b2bDiff)>0?'+':''}${b2bDiff} vs season</div>` : ''}
            </div>
            <div class="split-col">
              <div class="split-label-sm">1 Day Rest (${oneDay.GP || '—'} G)</div>
              <div class="split-big white">${oneDay.PTS ?? '—'}</div>
              <div class="split-sub">${oneDay.REB ?? '—'} reb · ${oneDay.AST ?? '—'} ast · ${oneDay.MIN ?? '—'} min</div>
            </div>
          </div>
          <div class="stat-row">
            <span class="stat-label">2+ Days Rest</span>
            <span class="stat-val white">${twoPlusDay.PTS ?? '—'} pts · ${twoPlusDay.REB ?? '—'} reb · ${twoPlusDay.AST ?? '—'} ast</span>
          </div>
          <div style="font-size:10px;color:#475569;margin-top:8px;padding-top:8px;border-top:1px solid #0d0f14">
            Model default B2B penalty: −8% to −12%. Player-specific data above overrides this.
          </div>
        </div>

        <!-- Recent Form Averages -->
        <div class="stat-card">
          <div class="stat-card-title">📈 Rolling Averages (Flag use only — 0% weight) <span class="tier-badge t2">TIER 2</span></div>
          <div class="stat-row"><span class="stat-label">L5 — Points</span><span class="stat-val white">${avg(last5,'PTS')}</span></div>
          <div class="stat-row"><span class="stat-label">L5 — Rebounds</span><span class="stat-val white">${avg(last5,'REB')}</span></div>
          <div class="stat-row"><span class="stat-label">L5 — Assists</span><span class="stat-val white">${avg(last5,'AST')}</span></div>
          <div class="stat-row"><span class="stat-label">L5 — PRA</span><span class="stat-val blue">${(parseFloat(avg(last5,'PTS'))||0)+(parseFloat(avg(last5,'REB'))||0)+(parseFloat(avg(last5,'AST'))||0) > 0 ? ((parseFloat(avg(last5,'PTS'))||0)+(parseFloat(avg(last5,'REB'))||0)+(parseFloat(avg(last5,'AST'))||0)).toFixed(1) : '—'}</span></div>
          <div class="stat-row" style="border-top:1px solid #1e2330;margin-top:4px;padding-top:8px"><span class="stat-label">L10 — Points</span><span class="stat-val white">${avg(last10,'PTS')}</span></div>
          <div class="stat-row"><span class="stat-label">L10 — Rebounds</span><span class="stat-val white">${avg(last10,'REB')}</span></div>
          <div class="stat-row"><span class="stat-label">L10 — Assists</span><span class="stat-val white">${avg(last10,'AST')}</span></div>
          <div class="stat-row" style="border-top:1px solid #1e2330;margin-top:4px;padding-top:8px"><span class="stat-label">L20 — Points</span><span class="stat-val white">${avg(last20,'PTS')}</span></div>
          <div class="stat-row"><span class="stat-label">L20 — Rebounds</span><span class="stat-val white">${avg(last20,'REB')}</span></div>
          <div class="stat-row"><span class="stat-label">L20 — Assists</span><span class="stat-val white">${avg(last20,'AST')}</span></div>
          <div style="font-size:10px;color:#475569;margin-top:8px;padding-top:8px;border-top:1px solid #0d0f14">
            ⚠️ These are structural flags only. Use to detect role changes. Do NOT weight into projection.
          </div>
        </div>

      </div>

      <!-- LAST 10 GAME LOG -->
      <div class="section-title">Last 10 Games — Full Log <span class="tier-badge t2">TIER 2</span></div>
      <div class="stat-card" style="overflow-x:auto">
        <table class="game-table">
          <thead><tr>
            <th>Date</th><th>Matchup</th><th>PTS</th><th>REB</th><th>AST</th><th>PRA</th><th>MIN</th><th>W/L</th>
          </tr></thead>
          <tbody>${logRows || '<tr><td colspan="8" style="color:#64748b;text-align:center;padding:20px">No game log data</td></tr>'}</tbody>
        </table>
      </div>

      <!-- CAREER BY SEASON -->
      <div class="section-title">Career Season History (Last 5 Years) <span class="tier-badge">TIER 1</span></div>
      <div class="stat-card" style="overflow-x:auto">
        <table class="game-table">
          <thead><tr><th>Season</th><th>Team</th><th>GP</th><th>PTS</th><th>REB</th><th>AST</th><th>MIN</th><th>USG%</th></tr></thead>
          <tbody>${careerRows || '<tr><td colspan="8" style="color:#64748b;text-align:center;padding:20px">No career data</td></tr>'}</tbody>
        </table>
      </div>

      <!-- PROJECTION CALCULATOR -->
      <div class="section-title">⚡ Model Projection Calculator</div>
      <div class="calc-card">
        <div class="calc-title">Build Independent Projection — v3.1 Formula: (Career × 0.855) + (Season × 0.142) + (Last Game × 0.003)</div>
        <div class="calc-inputs">
          <div class="calc-input">
            <label>Stat to Project</label>
            <select id="calcStat" style="width:100%;background:#111318;border:1px solid #1e2330;border-radius:5px;padding:7px 9px;color:#e2e8f0;font-size:13px;outline:none" onchange="prefillStat()">
              <option value="pts">Points</option>
              <option value="reb">Rebounds</option>
              <option value="ast">Assists</option>
              <option value="pra">PRA (manual entry)</option>
              <option value="custom">Custom stat</option>
            </select>
          </div>
          <div class="calc-input">
            <label>Career Avg (85.5%)</label>
            <input type="number" id="calcCareer" step="0.1" value="${careerPts}"/>
          </div>
          <div class="calc-input">
            <label>Season Avg (14.2%)</label>
            <input type="number" id="calcSeason" step="0.1" value="${seasonPts}"/>
          </div>
          <div class="calc-input">
            <label>Last Game (0.3%)</label>
            <input type="number" id="calcLast" step="0.1" value="${lastGamePts}"/>
          </div>
          <div class="calc-input">
            <label>Book's Line</label>
            <input type="number" id="calcLine" step="0.5" placeholder="e.g. 22.5" oninput="updateGap()"/>
          </div>
          <div class="calc-input">
            <label>Game Situation</label>
            <select id="calcContext" style="width:100%;background:#111318;border:1px solid #1e2330;border-radius:5px;padding:7px 9px;color:#e2e8f0;font-size:13px;outline:none">
              <option value="">Normal rest</option>
              <option value="b2b">B2B (0 days rest)</option>
              <option value="home">Home game</option>
              <option value="away">Away game</option>
            </select>
          </div>
        </div>
        <div class="mult-wrap">
          <div class="mult-label">Situational Multipliers (click to toggle):</div>
          <div class="mult-tags" id="mults"></div>
        </div>
        <button class="calc-btn" onclick="runCalc()">⚡ Calculate Projection</button>
        <div id="calcResult" style="display:none">
          <div class="calc-result">
            <div>
              <div class="calc-proj-label">Our Independent Projection</div>
              <div class="calc-proj-num" id="projNum">—</div>
              <div style="font-size:10px;color:#475569;margin-top:4px" id="projFormula"></div>
              <div style="font-size:10px;color:#475569;margin-top:2px" id="projMults"></div>
            </div>
            <div style="text-align:right">
              <div class="gap-display" id="gapNum">—</div>
              <div style="font-size:11px;color:#64748b;margin-top:4px" id="gapStatus"></div>
              <div style="font-size:10px;color:#475569;margin-top:4px" id="dirNote"></div>
            </div>
          </div>
        </div>
      </div>

    `; // end content.innerHTML

    // Prefill stat data store for calculator switching
    window._PLAYER_STATS = {
      pts: { career: careerPts, season: seasonPts, last: lastGamePts },
      reb: { career: careerReb, season: seasonReb, last: parseFloat(logs[0]?.REB || seasonReb) },
      ast: { career: careerAst, season: seasonAst, last: parseFloat(logs[0]?.AST || seasonAst) },
      pra: {
        career: careerPts + careerReb + careerAst,
        season: parseFloat(season.PTS||0) + parseFloat(season.REB||0) + parseFloat(season.AST||0),
        last: parseFloat(logs[0]?.PTS||0) + parseFloat(logs[0]?.REB||0) + parseFloat(logs[0]?.AST||0)
      }
    };
    buildMultiplierTags();

  } catch (err) {
    content.innerHTML = `
      <div class="error-card">
        <b>Failed to load player data.</b><br><br>
        Error: ${err.message}<br><br>
        The NBA Stats API (stats.nba.com) requires requests to come directly from your browser with proper headers.
        This dashboard is designed to do exactly that — if you're seeing this error, try:<br>
        1. Hard refresh (Ctrl+Shift+R / Cmd+Shift+R)<br>
        2. Disable any VPN or ad blocker that might block stats.nba.com<br>
        3. Try a different browser
      </div>`;
  }
}

// ────────────────────────────────────────────────────────────────────────────
// STAT SELECTOR PREFILL
// ────────────────────────────────────────────────────────────────────────────
function prefillStat() {
  const stat = document.getElementById('calcStat')?.value;
  const data = window._PLAYER_STATS;
  if (!data || !data[stat]) return;
  document.getElementById('calcCareer').value = data[stat].career.toFixed(1);
  document.getElementById('calcSeason').value = data[stat].season.toFixed(1);
  document.getElementById('calcLast').value = data[stat].last.toFixed(1);
  runCalc();
}

// ────────────────────────────────────────────────────────────────────────────
// MULTIPLIER TAGS
// ────────────────────────────────────────────────────────────────────────────
const MULTIPLIERS = [
  { label: 'Key teammate OUT', pct: 10, neg: false },
  { label: 'B2B 2nd night', pct: -10, neg: true },
  { label: 'B2B + 35min last night', pct: -15, neg: true },
  { label: 'Opp bottom-10 pos defense', pct: 8, neg: false },
  { label: 'Opp top-5 pos defense', pct: -12, neg: true },
  { label: 'High pace game', pct: 5, neg: false },
  { label: 'Low pace game', pct: -5, neg: true },
  { label: 'Blowout risk (spread 12+)', pct: -20, neg: true },
  { label: 'Expected blowout loss side', pct: 5, neg: false },
  { label: 'Revenge game vs former team', pct: 15, neg: false },
  { label: 'Post-injury return (<3 G)', pct: -7, neg: true },
  { label: 'High-foul referee (NBA)', pct: 3, neg: false },
  { label: 'Type A edge confirmed', pct: 8, neg: false },
];

const activeMultipliers = new Set();

function buildMultiplierTags() {
  const wrap = document.getElementById('mults');
  if (!wrap) return;
  activeMultipliers.clear();
  wrap.innerHTML = MULTIPLIERS.map((m, i) => `
    <div class="mtag${m.neg ? ' neg' : ''}" id="mt${i}" onclick="toggleMult(${i})"
         title="${m.pct > 0 ? '+' : ''}${m.pct}%">
      ${m.label} (${m.pct > 0 ? '+' : ''}${m.pct}%)
    </div>`).join('');
}

function toggleMult(i) {
  const el = document.getElementById(`mt${i}`);
  if (!el) return;
  if (activeMultipliers.has(i)) {
    activeMultipliers.delete(i);
    el.classList.remove('on');
  } else {
    activeMultipliers.add(i);
    el.classList.add('on');
  }
}

// ────────────────────────────────────────────────────────────────────────────
// CALCULATOR
// ────────────────────────────────────────────────────────────────────────────
let lastProjection = null;

function runCalc() {
  const career = parseFloat(document.getElementById('calcCareer')?.value);
  const season = parseFloat(document.getElementById('calcSeason')?.value);
  const last = parseFloat(document.getElementById('calcLast')?.value) || season;
  if (isNaN(career) || isNaN(season)) return;

  let proj = (career * 0.855) + (season * 0.142) + (last * 0.003);
  const base = proj;
  const multDesc = [];

  activeMultipliers.forEach(i => {
    const m = MULTIPLIERS[i];
    const adj = proj * (m.pct / 100);
    proj += adj;
    multDesc.push(`${m.label}: ${m.pct > 0 ? '+' : ''}${adj.toFixed(2)}`);
  });

  lastProjection = proj;

  document.getElementById('projNum').textContent = proj.toFixed(1);
  document.getElementById('projFormula').textContent =
    `Base: (${career}×0.855) + (${season}×0.142) + (${last}×0.003) = ${base.toFixed(1)}`;
  document.getElementById('projMults').textContent =
    multDesc.length ? 'Adjustments: ' + multDesc.join(' | ') : 'No multipliers applied';
  document.getElementById('calcResult').style.display = 'block';
  updateGap();
}

function updateGap() {
  if (!lastProjection) return;
  const line = parseFloat(document.getElementById('calcLine')?.value);
  if (isNaN(line)) {
    document.getElementById('gapNum').textContent = 'Enter line →';
    return;
  }
  const gap = Math.abs((lastProjection - line) / line * 100);
  const dir = lastProjection > line ? 'OVER' : 'UNDER';
  const dirColor = lastProjection > line ? '#4ade80' : '#f87171';

  let status, statusColor;
  if (gap >= 20) { status = '✅ STRONG BET'; statusColor = '#4ade80'; }
  else if (gap >= 10) { status = '✅ BET'; statusColor = '#60a5fa'; }
  else if (gap >= 5) { status = '⚠️ LEAN / NO BET'; statusColor = '#fb923c'; }
  else { status = '🪙 NO BET (coin flip)'; statusColor = '#64748b'; }

  document.getElementById('gapNum').innerHTML =
    `<span style="color:${dirColor}">${dir}</span> &nbsp;·&nbsp; <span style="color:#e2e8f0">${gap.toFixed(1)}% gap</span>`;
  document.getElementById('gapStatus').innerHTML =
    `<span style="color:${statusColor}">${status}</span>`;
  document.getElementById('dirNote').textContent =
    `Proj ${lastProjection.toFixed(1)} vs Line ${line} · ${gap.toFixed(1)}% gap`;
}

// ────────────────────────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────────────────────────
loadAllPlayers();
</script>
</body>
</html>
